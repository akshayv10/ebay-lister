name: Daily eBay auto-lister

# AUTOMATION IS PAUSED — manual runs only, on purpose.
#
# Publishing is opt-in: only mode "full" creates real eBay listings. Every other mode
# (default "dry-run") sources and validates without listing, so testing can never list
# by accident. Repository variable LIVE_LISTING=0 hard-stops publishing regardless of mode.
#
# To enable the daily schedule later, uncomment the two `schedule` lines and set the cron
# to your desired time IN UTC (it may start a few minutes late; "0 14 * * *" is 14:00 UTC).
# Scheduled runs publish — they are already included in the LIVE condition below.
on:
  # schedule:
  #   - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Safe manual operation"
        type: choice
        options:
          - dry-run
          - sheet-sync-only
          - email-test
          - full
        default: dry-run

permissions:
  contents: write   # allows committing updated history back to the repo

concurrency:
  group: daily-ebay-lister
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # --- non-secret config (committed) ---
      EBAY_ACCOUNT_CONFIG: ebay-account.json
      HISTORY_PATH: state/resale-product-history.jsonl
      RUNS_DIR: ebay-listing-runs
      RUN_TZ: ${{ vars.RUN_TZ || 'Asia/Kolkata' }}
      ALI_DEBUG: ${{ vars.ALI_DEBUG || '0' }}
      SHEETS_SPREADSHEET_ID: 10GgtsN_cxhHBvbEYa4vUXBUbC-LqeElkzmRiL3TT0Uk
      SHEETS_TAB_NAME: Auto Lister
      SHEETS_SPREADSHEET_URL: https://docs.google.com/spreadsheets/d/10GgtsN_cxhHBvbEYa4vUXBUbC-LqeElkzmRiL3TT0Uk/edit
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      # --- eBay secrets ---
      EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
      EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
      EBAY_RUNAME: ${{ secrets.EBAY_RUNAME }}
      EBAY_REFRESH_TOKEN: ${{ secrets.EBAY_REFRESH_TOKEN }}
      # --- AliExpress secrets ---
      ALIEXPRESS_APP_KEY: ${{ secrets.ALIEXPRESS_APP_KEY }}
      ALIEXPRESS_APP_SECRET: ${{ secrets.ALIEXPRESS_APP_SECRET }}
      ALIEXPRESS_TRACKING_ID: ${{ secrets.ALIEXPRESS_TRACKING_ID }}
      # Seller token for ds.product.get (variants) + freight. Without it, listings are
      # single-variation. Re-mint with mint_ali_token.py when it expires.
      ALIEXPRESS_ACCESS_TOKEN: ${{ secrets.ALIEXPRESS_ACCESS_TOKEN }}
      # --- OpenAI (eBay copy) ---
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      # --- email secrets ---
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      NOTIFY_FROM: ${{ secrets.NOTIFY_FROM }}
      SMTP_HOST: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
      SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Publishing requires mode=full (or a scheduled run) AND LIVE_LISTING not being '0'.
      # Anything else runs daily_run.py with no --live flag, which is a dry run.
      - name: Run lister
        if: github.event_name == 'schedule' || inputs.mode == 'full' || inputs.mode == 'dry-run'
        env:
          LIVE: ${{ ((github.event_name == 'schedule' || inputs.mode == 'full') && vars.LIVE_LISTING != '0') && 'yes' || 'no' }}
        run: |
          if [ "$LIVE" = "yes" ]; then
            echo "::warning::LIVE MODE — this run will publish real eBay listings."
            python find-and-prepare-ebay-listings/scripts/daily_run.py --live
          else
            echo "DRY RUN — sourcing and validating only; nothing will be listed."
            python find-and-prepare-ebay-listings/scripts/daily_run.py
          fi

      - name: Backfill and sync Google Sheet
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'sheet-sync-only'
        run: python find-and-prepare-ebay-listings/scripts/sheet_sync.py --backfill-history

      - name: Send notification test
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'email-test'
        run: python find-and-prepare-ebay-listings/scripts/notify.py --test

      - name: Heartbeat + persist history
        if: always()
        run: |
          mkdir -p state
          date -u +"%Y-%m-%dT%H:%M:%SZ" > state/last-run.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state
          if git diff --cached --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "daily run heartbeat + history $(date -u +%F)"
            git push
          fi
